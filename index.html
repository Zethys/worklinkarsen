<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WorkLink — Ultimate Ecosystem</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6c38ff;
            --primary-dark: #562cd9;
            --bg: #ffffff;
            --card-bg: #ffffff;
            --text: #1b1b1b;
            --success: #27ae60;
            --input-bg: #f3f4f6;
            --star: #f1c40f;
            --accent: #ff4757;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: var(--bg); color: var(--text); transition: 0.3s; line-height: 1.6; }

        /* Navigation */
        nav {
            display: flex; justify-content: space-between; align-items: center;
            padding: 20px 50px; background: var(--primary); color: white;
            position: sticky; top: 0; z-index: 1000;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        .logo { font-weight: 800; font-size: 28px; cursor: pointer; }
        .nav-links { display: flex; align-items: center; }
        .nav-links a { color: white; text-decoration: none; margin-left: 25px; font-size: 14px; font-weight: 600; cursor: pointer; }

        .page { display: none; min-height: 100vh; padding-bottom: 80px; }
        .active { display: block; animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        .container { max-width: 1200px; margin: 0 auto; padding: 40px 20px; }
        .card { background: var(--card-bg); padding: 30px; border-radius: 24px; margin-bottom: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.06); }

        /* HERO */
        .hero {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 40px;
            padding: 80px 0;
        }
        .hero h1 { font-size: 54px; line-height: 1.1; }
        .hero p { font-size: 18px; margin: 20px 0; color: #555; }
        .hero-img {
            width: 420px;
            border-radius: 30px;
            animation: float 4s ease-in-out infinite;
            box-shadow: 0 30px 60px rgba(0,0,0,0.15);
        }
        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-20px); }
            100% { transform: translateY(0px); }
        }

        .badge { display: inline-block; padding: 4px 12px; border-radius: 8px; font-size: 11px; font-weight: 800; }
        .badge-pro { background: linear-gradient(90deg, #f1c40f, #f39c12); color: white; }
        .badge-cat { background: var(--primary); color: white; }

        .level-bar { height: 10px; background: #eee; border-radius: 5px; margin: 10px 0; overflow: hidden; }
        .level-progress { height: 100%; background: var(--success); transition: 0.5s; }

        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); z-index: 2000; align-items: center; justify-content: center; }
        .modal-content { background: white; padding: 40px; border-radius: 30px; width: 90%; max-width: 500px; }

        .btn { padding: 16px 25px; border-radius: 14px; border: none; font-weight: 700; cursor: pointer; }
        .btn-main { background: var(--primary); color: white; }
        .btn-ghost { background: #f3f4f6; }

        .input-group input, .input-group select, .input-group textarea {
            width: 100%; padding: 16px; border-radius: 14px; border: none; background: var(--input-bg);
        }

        #toasts { position: fixed; top: 100px; right: 20px; }
        .toast { background: var(--primary); color: white; padding: 15px 25px; border-radius: 12px; margin-bottom: 10px; }
    </style>
</head>
<body>

<div id="toasts"></div>

<nav>
    <div class="logo" onclick="showPage('home')">worklink</div>
    <div class="nav-links">
        <a onclick="showPage('home')">Главная</a>
        <a onclick="showPage('profile')">Профиль</a>
        <a onclick="showPage('worker_panel')">Работа</a>
    </div>
</nav>

<!-- HOME -->
<div id="home" class="page active">
    <div class="container hero">
        <div>
            <h1>Работа будущего уже здесь</h1>
            <p>Опыт = деньги. Рейтинг = статус. Добро пожаловать в новую экономику.</p>
            <button class="btn btn-main" onclick="showPage('register')">Начать</button>
        </div>
        <img class="hero-img" src="https://images.unsplash.com/photo-1521737604893-d14cc237f11d" alt="hero">
    </div>
</div>

<!-- PROFILE -->
<div id="profile" class="page">
<div class="container">
    <div class="card">
        <h2>Профиль</h2>
        <p>Уровень: <span id="levelText">1</span></p>
        <div class="level-bar"><div id="levelProgress" class="level-progress" style="width:10%"></div></div>
        <button class="btn btn-main" onclick="addFundsBusiness()">Пополнить (Бизнес)</button>
    </div>
</div>
</div>

<div id="worker_panel" class="page"><div class="container">
<h2>Задачи</h2>
<div id="jobList"></div>
</div></div>

<div id="chatModal" class="modal">
<div class="modal-content">
<h2>Чат</h2>
<textarea style="width:100%; height:200px;"></textarea>
<button class="btn btn-main" onclick="closeModal()">Закрыть</button>
</div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
import { getDatabase, ref, update } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

const app = initializeApp({
apiKey:"X",
databaseURL:"https://worklink-5384c-default-rtdb.firebaseio.com"
});
const db=getDatabase(app);

let user=JSON.parse(localStorage.getItem('wl_session'));

window.addFundsBusiness = async () => {
    if(!user || user.role!=='business') return alert('Только бизнес аккаунт');
    let amt = prompt('Сумма пополнения');
    amt = Number(amt);
    if(!amt) return;
    await update(ref(db,'users/'+user.phone), { balance: (user.balance||0)+amt });
    alert('Баланс пополнен');
};

window.completeJob = async (id, exp=20) => {
    await update(ref(db,'orders/'+id), {status:'done'});
    await update(ref(db,'users/'+user.phone), { exp: (user.exp||0)+exp });
};

window.showPage=(id)=>{
    document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
    document.getElementById(id).classList.add('active');
};

window.closeModal=()=>document.getElementById('chatModal').style.display='none';

</script>

</body>
</html>
